name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ThreatDeck

jobs:
  build:
    name: Build Release Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ThreatDeck-x86_64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ThreatDeck-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ThreatDeck-aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Strip binary (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## ThreatDeck ${{ github.ref_name }}

            ### Binaries
            | Platform | Architecture | Artifact |
            |----------|-------------|----------|
            | Linux    | x86_64      | `ThreatDeck-x86_64-linux` |
            | macOS    | x86_64      | `ThreatDeck-x86_64-macos` |
            | macOS    | aarch64     | `ThreatDeck-aarch64-macos` |

            ### Installation
            Download the binary for your platform, make it executable, and place it in your `$PATH`:

            ```bash
            chmod +x ThreatDeck-<platform>
            sudo mv ThreatDeck-<platform> /usr/local/bin/ThreatDeck
            ```

            ### Verification
            Verify the checksum:
            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: |
            dist/ThreatDeck-x86_64-linux
            dist/ThreatDeck-x86_64-macos
            dist/ThreatDeck-aarch64-macos
            dist/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
